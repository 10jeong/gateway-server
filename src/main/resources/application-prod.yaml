spring:
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}
    fetch-registry: true
  instance:
    hostname: ${EUREKA_INSTANCE_HOST_NAME}
    non-secure-port: ${SERVER_PORT:8080}
    prefer-ip-address: false

jwt:
  secret: ${JWT_INTERNAL_SECRET}

gateway:
  whitelist:
    - /users/signup
    - /auth/login
    - /auth/refresh
    - /internal/**