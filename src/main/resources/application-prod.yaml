spring:
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/users/**, /auth/**
            - id: record-service
              uri: lb://record-service
              predicates:
                - Path=/feeds/**
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/notifications/**
            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/payments/**
            - id: place-service
              uri: lb://place-service
              predicates:
                - Path=/places/**
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/orders/**
            - id: matching-service
              uri: lb://matching-service
              predicates:
                - Path=/matching/**, /user-settings/**
            - id: plan-service
              uri: lb://plan-service
              predicates:
                - Path=/plans/**
            - id: company-service
              uri: lb://company-service
              predicates:
                - Path=/companies/**, /products/**
server:
  port: ${SERVER_PORT:8080}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL}
    fetch-registry: true
  instance:
    hostname: ${EUREKA_INSTANCE_HOST_NAME}
    non-secure-port: ${SERVER_PORT:8080}
    prefer-ip-address: false

jwt:
  secret: ${JWT_INTERNAL_SECRET}

gateway:
  whitelist:
    - /users/signup
    - /auth/login
    - /auth/refresh
    - /internal/**