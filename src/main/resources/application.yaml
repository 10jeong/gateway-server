spring:
  application:
    name: gateway-server
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    compatibility-verifier:
      enabled: false
    gateway:
      server:
        webflux:
          default-filters:
            - RemoveRequestHeader=X-Forwarded-For
            - RemoveRequestHeader=X-Forwarded-Host
            - RemoveRequestHeader=X-Forwarded-Proto
            - RemoveRequestHeader=X-Forwarded-Port
            - RemoveRequestHeader=X-Forwarded-Prefix
            - name: Retry
              args:
                retries: 3
                methods: GET
                statuses: INTERNAL_SERVER_ERROR, BAD_GATEWAY, SERVICE_UNAVAILABLE, GATEWAY_TIMEOUT
                backoff:
                  firstBackoff: 50ms
                  maxBackoff: 500ms
                  factor: 2
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/users/**, /auth/**
            - id: record-service
              uri: lb://record-service
              predicates:
                - Path=/feeds/**
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/notifications/**
            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/payments/**
            - id: place-service
              uri: lb://place-service
              predicates:
                - Path=/places/**
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/orders/**
            - id: matching-service
              uri: lb://matching-service
              predicates:
                - Path=/matching/**, /user-settings/**
            - id: plan-service
              uri: lb://plan-service
              predicates:
                - Path=/plans/**
            - id: company-service
              uri: lb://company-service
              predicates:
                - Path=/companies/**, /products/**
          httpclient:
            max-header-size: 65536

server:
  port: 8080
  netty:
    max-initial-line-length: 65536
    max-header-size: 65536

eureka:
  client:
    service-url:
#      defaultZone: ${EUREKA_SERVER_URL:https://dolphin-device-evident.ngrok-free.dev/eureka}
#  instance:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
  instance:
    instance-id: ${spring.cloud.client.hostname}:${spring.application.instance_id:${random.value}}
    hostname: pelvis-pounce-attempt.ngrok-free.dev
    non-secure-port: 80
    secure-port: 443
    prefer-ip-address: false
    secure-port-enabled: false

gateway:
  whitelist:
    - /users/signup
    - /auth/login
    - /auth/refresh
    - /internal/**
    - /**/actuator/**
    - /payments/toss-test-payment.html
    - /payments/success
    - /payments/fail

jwt:
  secret: ${JWT_SECRET}
  internal-secret: ${JWT_INTERNAL_SECRET}

